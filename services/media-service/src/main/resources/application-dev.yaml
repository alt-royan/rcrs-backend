server:
  port: 8082

spring:
  application:
    name: media-service
  temporal:
    connection:
      target: ${SPRING_TEMPORAL_CONNECTION_TARGET}
    namespace: default
    workers:
      capacity:
        max-concurrent-workflow-task-pollers: 6
        max-concurrent-activity-task-pollers: 6
      rate-limits:
        max-worker-activities-per-second: 2
        max-task-queue-activities-per-second: 2
    workflow-cache:
      max-instances: 10
      max-threads: 10
    activities:
      validate:
        start-to-close-timeout: 10s
        retry:
          initial-interval: 1s
          backoff-coefficient: 2
          maximum-interval: 10s
          maximum-attempts: 3
      thumbnail:
        start-to-close-timeout: 15s
        retry:
          initial-interval: 1s
          backoff-coefficient: 2
          maximum-interval: 15s
          maximum-attempts: 3
      probeAudioMetadata:
        start-to-close-timeout: 30s
        retry:
          initial-interval: 1s
          backoff-coefficient: 2
          maximum-interval: 15s
          maximum-attempts: 3
      s3Activity:
        start-to-close-timeout: 15s
        retry:
          initial-interval: 1s
          backoff-coefficient: 2
          maximum-interval: 15s
          maximum-attempts: 3
      dbActivity:
        start-to-close-timeout: 10s
        retry:
          initial-interval: 1s
          backoff-coefficient: 2
          maximum-interval: 10s
          maximum-attempts: 3
      transcodeAudioActivity:
        start-to-close-timeout: 5m
        retry:
          initial-interval: 1s
          backoff-coefficient: 2
          maximum-interval: 1m
          maximum-attempts: 3
      transcodingStatus:
        start-to-close-timeout: 10s
        retry:
          initial-interval: 1s
          backoff-coefficient: 2
          maximum-interval: 10s
          maximum-attempts: 3
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    user: ${SPRING_LIQUIBASE_USER}
    password: ${SPRING_LIQUIBASE_PASSWORD}
    url: ${SPRING_LIQUIBASE_URL}
    database-change-log-table: media_databasechangelog
    database-change-log-lock-table: media_databasechangeloglock
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${SPRING_HIBERNATE_DEFAUT_SCHEMA}
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
  security:
    enabled: true
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI}
      client:
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI}
            user-name-attribute: ${USERNAME_ATTRIBUTE}
        registration:
          keycloak:
            client-id: ${CLIENT_ID}
            client-secret: ${CLIENT_SECRET}
            scope: ${SCOPE}
  cloud:
    aws:
      credentials:
        access-key: ${SPRING_CLOUD_AWS_CREDENTIALS_ACCESS_KEY}
        secret-key: ${SPRING_CLOUD_AWS_CREDENTIALS_SECRET_KEY}
      region:
        static: ${SPRING_CLOUD_AWS_REGION_STATIC}
      endpoint: ${SPRING_CLOUD_AWS_ENDPOINT}
      s3:
        path-style-access-enabled: true

media:
  audio:
    bucket:
      name: ${AUDIO_BUCKET}
      public-url: ${AUDIO_PUBLIC_URL}
    validation:
      formats: ${AUDIO_VALIDATION_FORMATS}
      duration:
        min: ${AUDIO_VALIDATION_DURATION_MIN}
        max: ${AUDIO_VALIDATION_DURATION_MAX}
    bitrates: ${AUDIO_BITRATES}
    codec: ${AUDIO_CODEC}
    rate: ${AUDIO_RATE}
    format: ${AUDIO_FORMAT}
    loudnorm:
      I: ${AUDIO_LOUDNORM_I}
      LRA: ${AUDIO_LOUDNORM_LRA}
      TP: ${AUDIO_LOUDNORM_TP}
  image:
    bucket:
      name: ${IMAGE_BUCKET}
      public-url: ${IMAGE_PUBLIC_URL}
    thumbnails:
      sizes: ${IMAGE_THUMBNAILS_SIZES}
  upload:
    bucket:
      name: ${UPLOAD_BUCKET}
      public-url: ${UPLOAD_PUBLIC_URL}
    signature-duration: ${UPLOAD_SIGNATURE_DURATION}
    upload-duration: ${UPLOAD_UPLOAD_DURATION}
  sqs:
    queue: ${SQS_QUEUE}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
  instance:
    preferIpAddress: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
