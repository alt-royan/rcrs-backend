server:
  port: 8082

spring:
  application:
    name: media-service
  temporal:
    connection:
      target: 127.0.0.1:7233
    namespace: default
    workers:
      capacity:
        max-concurrent-workflow-task-pollers: 6
        max-concurrent-activity-task-pollers: 6
      rate-limits:
        max-worker-activities-per-second: 2
        max-task-queue-activities-per-second: 2
    workflow-cache:
      max-instances: 10
      max-threads: 10
    activities:
      validate:
        start-to-close-timeout: 10s
        retry:
          initial-interval: 1s
          backoff-coefficient: 2
          maximum-interval: 10s
          maximum-attempts: 3
      thumbnail:
        start-to-close-timeout: 15s
        retry:
          initial-interval: 1s
          backoff-coefficient: 2
          maximum-interval: 15s
          maximum-attempts: 3
      probeAudioMetadata:
        start-to-close-timeout: 30s
        retry:
          initial-interval: 1s
          backoff-coefficient: 2
          maximum-interval: 15s
          maximum-attempts: 3
      s3Activity:
        start-to-close-timeout: 15s
        retry:
          initial-interval: 1s
          backoff-coefficient: 2
          maximum-interval: 15s
          maximum-attempts: 3
      dbActivity:
        start-to-close-timeout: 10s
        retry:
          initial-interval: 1s
          backoff-coefficient: 2
          maximum-interval: 10s
          maximum-attempts: 3
      transcodeAudioActivity:
        start-to-close-timeout: 5m
        retry:
          initial-interval: 1s
          backoff-coefficient: 2
          maximum-interval: 1m
          maximum-attempts: 3
      transcodingStatus:
        start-to-close-timeout: 10s
        retry:
          initial-interval: 1s
          backoff-coefficient: 2
          maximum-interval: 10s
          maximum-attempts: 3
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    user: postgres
    password: postgres
    url: jdbc:postgresql://localhost:5432/postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: rcrs_media
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: localhost:9092
  cloud:
    aws:
      credentials:
        access-key: test
        secret-key: test
      region:
        static: eu-west-1
      endpoint: http://localhost.localstack.cloud:4566
      s3:
        path-style-access-enabled: true

cdn:
  images:
    bucket: images
    thumbnails: 64,300,640
  audios:
    bucket: rcrs-audio
  uploads:
    bucket: rcrs-upload
    signature-duration: 24h
    file-duration: 24h
    sqs:
      queue: rcrs-upload-event-queue
audio:
  validation:
    formats: mp3, wav, ogg, flac
    duration:
      min: 1s
      max: 2h
  bitrates: 128k, 192k, 320k
  codec: libvorbis
  rate: 44100
  format: ogg
  loudnorm:
    I: -18
    LRA: 18
    TP: -1


eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
