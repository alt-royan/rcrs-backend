version: '3.8'

services:
  catalog-service:
    build:
      context: ..
      dockerfile: services/catalog-service/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/postgres?currentSchema=rcrs_catalog
      - SPRING_R2DBC_URL=r2dbc:postgresql://postgres:5432/postgres?currentSchema=rcrs_catalog
      - SPRING_KAFKA_CONSUMER_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_KAFKA_PRODUCER_BOOTSTRAP_SERVERS=kafka:9092
      - S3_IMAGES_ENDPOINT=http://s3:9444
    depends_on:
      - postgres
      - kafka
      - s3
    networks:
      - rcrs-network

  media-service:
    build:
      context: ..
      dockerfile: services/media-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/postgres?currentSchema=rcrs_upload
      - SPRING_LIQUIBASE_URL=jdbc:postgresql://postgres:5432/postgres?currentSchema=rcrs_upload
      - SPRING_KAFKA_CONSUMER_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_KAFKA_PRODUCER_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_CLOUD_AWS_ENDPOINT=http://localstack:4566
    depends_on:
      - postgres
      - kafka
      - localstack
    networks:
      - rcrs-network

  upload-service:
    build:
      context: ..
      dockerfile: services/upload-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - FEIGN_MEDIA-SERVICE_URL=http://media-service:8081
      - FEIGN_CATALOG-SERVICE_URL=http://catalog-service:8080
    depends_on:
      - catalog-service
      - media-service
    networks:
      - rcrs-network

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - rcrs-network

  kafka:
    image: confluentinc/cp-kafka:7.2.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
    networks:
      - rcrs-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.2.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - rcrs-network

  localstack:
    image: localstack/localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs, s3
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN:-}
    networks:
      - rcrs-network

  s3:
    image: scireum/s3-ninja:latest
    ports:
      - "9444:9000"
    networks:
      - rcrs-network

networks:
  rcrs-network:
    driver: bridge

volumes:
  postgres-data:
