server:
  port: 8081

spring:
  application:
    name: metadata-read-service
  mongodb:
    uri: mongodb://localhost:27017/rcrs_catalog
  kafka:
    bootstrap-servers: localhost:9092

cdn:
  images:
    endpoint: "http://images.localhost:4566"

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized