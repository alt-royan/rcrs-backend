server:
  port: 8082

spring:
  application:
    name: workflow-service
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000

temporal:
  service-url: localhost:7233
  namespace: default
  task-queue: workflow-task-queue
  activities:
    metadata:
      start-to-close-timeout: 30s
      retry:
        initial-interval: 1s
        backoff-coefficient: 2
        maximum-interval: 30s
        maximum-attempts: 5
    audio:
      start-to-close-timeout: 60s
      retry:
        initial-interval: 2s
        backoff-coefficient: 2
        maximum-interval: 60s
        maximum-attempts: 3
    search:
      start-to-close-timeout: 15s
      retry:
        initial-interval: 1s
        backoff-coefficient: 2
        maximum-interval: 20s
        maximum-attempts: 5
    text:
      start-to-close-timeout: 30s
      retry:
        initial-interval: 1s
        backoff-coefficient: 2
        maximum-interval: 30s
        maximum-attempts: 5
    notification:
      start-to-close-timeout: 10s
      retry:
        initial-interval: 1s
        backoff-coefficient: 2
        maximum-interval: 15s
        maximum-attempts: 3
    statistics:
      start-to-close-timeout: 10s
      retry:
        initial-interval: 1s
        backoff-coefficient: 2
        maximum-interval: 15s
        maximum-attempts: 3
    cleanup:
      start-to-close-timeout: 120s
      retry:
        initial-interval: 5s
        backoff-coefficient: 2
        maximum-interval: 120s
        maximum-attempts: 3

feign:
  metadata-write-service:
    url: http://localhost:8080
  media-service:
    url: http://localhost:8082
  search-service:
    url: http://localhost:8083

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
