spring:
  application:
    name: catalog-service
  cassandra:
    keyspace-name: "rcrs"
    contact-points: "localhost:9042"
    local-datacenter: "datacenter-1"
  kafka:
    bootstrap-servers: localhost:9092
    process-topic: "entity-process-topic"
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    url: jdbc:cassandra://localhost:9042/rcrs?localdatacenter=my-datacenter-1&compliancemode=Liquibase
    driver-class-name: com.ing.data.cassandra.jdbc.CassandraDriver
s3:
  url: http://localhost:9444
logging:
  level:
    root: DEBUG

app:
  read:
    enabled: true
  write:
    enabled: true
