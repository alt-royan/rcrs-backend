spring:
  application:
    name: catalog-service
  cassandra:
    keyspace-name: "rcrs"
    contact-points: "localhost:9042"
    local-datacenter: "my-datacenter-1"
    schema-action: CREATE_IF_NOT_EXISTS
  kafka:
    bootstrap-servers: localhost:9092
    process-topic: "entity-process-topic"
s3:
  url: http://localhost:9444
logging:
  level:
    root: DEBUG

app:
  read:
    enabled: true
  write:
    enabled: true
