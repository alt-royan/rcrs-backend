server:
  port: 8080

spring:
  application:
    name: catalog-service
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    user: postgres
    password: postgres
    url: jdbc:postgresql://localhost:5432/postgres?currentSchema=rcrs_catalog
  r2dbc:
    username: postgres
    password: postgres
    url: r2dbc:postgresql://localhost:5432/postgres?currentSchema=rcrs_catalog
  #cassandra:
    #keyspace-name: "rcrs_catalog"
    #contact-points: "localhost:9042"
    #local-datacenter: "my-datacenter-1"
    #schema-action: CREATE_IF_NOT_EXISTS
  kafka:
    topic:
      in: ${spring.application.name}-in
      media-service: media-topic-in
    consumer:
      bootstrap-servers: localhost:9092
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: my-group
      properties:
        reactiveAutoCommit: true
    producer:
      bootstrap-servers: localhost:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

s3:
  images:
    endpoint: "http://localhost:9444"

logging:
  level:
    root: INFO


app:
  read:
    enabled: true
  write:
    enabled: true
