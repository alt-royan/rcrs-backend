server:
  port: 8080

spring:
  application:
    name: catalog-service
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    user: postgres
    password: postgres
    url: jdbc:postgresql://localhost:5432/postgres?currentSchema=rcrs_catalog
  r2dbc:
    username: postgres
    password: postgres
    url: r2dbc:postgresql://localhost:5432/postgres?currentSchema=rcrs_catalog
  #cassandra:
    #keyspace-name: "rcrs_catalog"
    #contact-points: "localhost:9042"
    #local-datacenter: "my-datacenter-1"
    #schema-action: CREATE_IF_NOT_EXISTS
  kafka:
    bootstrap-servers: localhost:9092

cdn:
  images:
    endpoint: "http://images.localhost:4566"

logging:
  level:
    root: INFO

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true

app:
  read:
    enabled: true
  write:
    enabled: true
