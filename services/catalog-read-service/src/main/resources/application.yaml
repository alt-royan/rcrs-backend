server:
  port: 8083

spring:
  application:
    name: catalog-read-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/rcrs_catalog
  kafka:
    bootstrap-servers: localhost:9092

cdn:
  images:
    endpoint: "http://images.localhost:4566"

logging:
  level:
    root: INFO

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true
