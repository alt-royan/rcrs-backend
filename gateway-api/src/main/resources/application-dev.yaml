server:
  port: 8099

spring:
  application:
    name: gateway-api
  security:
    enabled: true
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI}
  cloud:
    gateway:
      routes:
        # user-service — prefix /me
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/me/**
          filters:
            - StripPrefix=1

        # workflow-service — prefix /workflow
        - id: workflow-service
          uri: lb://workflow-service
          predicates:
            - Path=/workflow/**
          filters:
            - StripPrefix=1

        # media-service — prefix /media
        - id: media-service
          uri: lb://media-service
          predicates:
            - Path=/media/**
          filters:
            - StripPrefix=1

        # search-service — no prefix
        - id: search-service
          uri: lb://search-service
          predicates:
            - Path=/api/search/**
          filters:
            - StripPrefix=1

        # metadata-read-service — no prefix
        - id: metadata-read-service
          uri: lb://metadata-read-service
          predicates:
            - Path=/api/catalog/**
          filters:
            - StripPrefix=1

        # metadata-write — NOT available via gateway
springdoc:
  swagger-ui:
    urls:
      - name: catalog
        url: /api/catalog/v3/api-docs
      - name: search
        url: /api/search/v3/api-docs
      - name: media
        url: /media/v3/api-docs
      - name: workflow
        url: /workflow/v3/api-docs
      - name: user
        url: /me/v3/api-docs

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
  instance:
    preferIpAddress: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: info
