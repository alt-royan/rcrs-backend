server.port=8099

spring.application.name=gateway-api

# ==================== Security ====================
spring.security.enabled=true
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/rcrs

# ==================== Gateway Routes ====================

# user-service — prefix /me
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=http://user-service:8085
spring.cloud.gateway.routes[0].predicates[0]=Path=/me/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# workflow-service — prefix /workflow
spring.cloud.gateway.routes[1].id=workflow-service
spring.cloud.gateway.routes[1].uri=http://workflow-service:8090
spring.cloud.gateway.routes[1].predicates[0]=Path=/workflow/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# media-service — prefix /media
spring.cloud.gateway.routes[2].id=media-service
spring.cloud.gateway.routes[2].uri=http://media-service:8082
spring.cloud.gateway.routes[2].predicates[0]=Path=/media/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# search-service — no prefix
spring.cloud.gateway.routes[3].id=search-service
spring.cloud.gateway.routes[3].uri=http://search-service:8083
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/search/**

# metadata-read-service — no prefix
spring.cloud.gateway.routes[4].id=metadata-read-service
spring.cloud.gateway.routes[4].uri=http://metadata-read-service:8081
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/catalog/**

# metadata-write — NOT available via gateway

# ==================== Actuator ====================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# ==================== Logging ====================
logging.level.root=info
