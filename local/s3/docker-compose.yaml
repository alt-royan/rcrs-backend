services:
  s3:
    image: scireum/s3-ninja:latest
    container_name: s3
    restart: unless-stopped
    volumes:
      - ./multipart:/home/sirius/multipart
    ports:
      - "9444:9000"
    environment:
      JAVA_XMX: "1g"
      JAVA_OPTS: >
        -Xmx1g -Xms512m
        -Djavax.net.ssl.trustStore=/etc/ssl/certs/java/cacerts
        -Djavax.net.ssl.trustStorePassword=changeit
    networks:
      - s3_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/ui" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  s3_net:
    driver: bridge