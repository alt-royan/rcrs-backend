  workflow-service:
    build:
      context: .
      dockerfile: services/workflow-service/Dockerfile
    container_name: workflow-service
    ports:
      - "8085:8082"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_TEMPORAL_CONNECTION_TARGET: temporal:7233
      FEIGN_METADATA-SERVICE_URL: http://metadata-write-service:8080
      FEIGN_MEDIA-SERVICE_URL: http://media-service:8082
      FEIGN_SEARCH-SERVICE_URL: http://search-service:8083
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    depends_on:
      discovery-server:
        condition: service_healthy
      temporal:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - rcrs

networks:
  rcrs:
    driver: bridge

volumes:
  postgres_data:
  mongodb_data:
  elasticsearch_data:
  temporal_pg_data:
