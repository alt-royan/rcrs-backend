services:
  # ==================== Application ====================

  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    container_name: discovery-server
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: dev
    networks:
      - rcrs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  metadata-write-service:
    build:
      context: .
      dockerfile: services/metadata-write-service/Dockerfile
    container_name: metadata-write-service
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres?currentSchema=rcrs_catalog
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_LIQUIBASE_URL: jdbc:postgresql://postgres:5432/postgres?currentSchema=rcrs_catalog
      SPRING_LIQUIBASE_USER: postgres
      SPRING_LIQUIBASE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CDN_IMAGES_ENDPOINT: http://s3:9000
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - rcrs

  metadata-read-service:
    build:
      context: .
      dockerfile: services/metadata-read-service/Dockerfile
    container_name: metadata-read-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/rcrs_catalog?replicaSet=rs0
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CDN_IMAGES_ENDPOINT: http://s3:9000
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    depends_on:
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - rcrs

  search-service:
    build:
      context: .
      dockerfile: services/search-service/Dockerfile
    container_name: search-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_ELASTICSEARCH_URL: http://elasticsearch:9200
      FEIGN_CATALOG-SERVICE_URL: http://metadata-write-service:8080
      CDN_IMAGES_ENDPOINT: http://s3:9000
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    depends_on:
      discovery-server:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - rcrs

