services:
  # ==================== Application ====================

  gateway-api:
    image: ghcr.io/alt-royan/rcrs-gateway-api:latest
    container_name: gateway-api
    ports:
      - "8099:8099"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8180/realms/rcrs
    networks:
      - rcrs

  metadata-write-service:
    image: ghcr.io/alt-royan/rcrs-metadata-write-service:latest
    container_name: metadata-write-service
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_HIBERNATE_DEFAUT_SCHEMA: rcrs_catalog
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_LIQUIBASE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_LIQUIBASE_USER: postgres
      SPRING_LIQUIBASE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CDN_IMAGES_ENDPOINT: http://images.localhost:9000
    networks:
      - rcrs

  metadata-read-service:
    image: ghcr.io/alt-royan/rcrs-metadata-read-service:latest
    container_name: metadata-read-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/rcrs_catalog
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CDN_IMAGES_ENDPOINT: http://images.localhost:9000
    networks:
      - rcrs

  search-service:
    image: ghcr.io/alt-royan/rcrs-search-service:latest
    container_name: search-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      CDN_IMAGES_ENDPOINT: http://images.localhost:9000
    networks:
      - rcrs

