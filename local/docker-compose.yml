services:
  # ==================== Application ====================

  discovery-server:
    image: ghcr.io/alt-royan/rcrs-discover-server:latest
    container_name: discovery-server
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: dev
    networks:
      - rcrs
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8761/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  gateway-api:
    image: ghcr.io/alt-royan/rcrs-gateway-api:latest
    container_name: gateway-api
    ports:
      - "8099:8099"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8180/realms/rcrs
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - rcrs

  metadata-write-service:
    image: ghcr.io/alt-royan/rcrs-metadata-write-service:latest
    container_name: metadata-write-service
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_HIBERNATE_DEFAUT_SCHEMA: rcrs_catalog
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_LIQUIBASE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_LIQUIBASE_USER: postgres
      SPRING_LIQUIBASE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CDN_IMAGES_ENDPOINT: http://images.localhost:9000
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      OAUTH2_ISSUER_URI: http://keycloak:8180/realms/rcrs
      KEYCLOAK_ISSUER_URI: http://keycloak:8180/realms/rcrs
      USERNAME_ATTRIBUTE: preferred_username
      CLIENT_ID: rcrs-app
      CLIENT_SECRET: xuTR1hmVfO5ERSNdgl23JpW3vKTrACk0ampYzmmW3XoGoaJtE8h18CweFsSONWYAC6S7IJbvu7na38odNMogSC
      SCOPE: openid
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - rcrs

  metadata-read-service:
    image: ghcr.io/alt-royan/rcrs-metadata-read-service:latest
    container_name: metadata-read-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/rcrs_catalog
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CDN_IMAGES_ENDPOINT: http://images.localhost:9000
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      OAUTH2_ISSUER_URI: http://keycloak:8180/realms/rcrs
      KEYCLOAK_ISSUER_URI: http://keycloak:8180/realms/rcrs
      USERNAME_ATTRIBUTE: preferred_username
      CLIENT_ID: rcrs-app
      CLIENT_SECRET: xuTR1hmVfO5ERSNdgl23JpW3vKTrACk0ampYzmmW3XoGoaJtE8h18CweFsSONWYAC6S7IJbvu7na38odNMogSC
      SCOPE: openid
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - rcrs

  search-service:
    image: ghcr.io/alt-royan/rcrs-search-service:latest
    container_name: search-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      CDN_IMAGES_ENDPOINT: http://images.localhost:9000
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      OAUTH2_ISSUER_URI: http://keycloak:8180/realms/rcrs
      KEYCLOAK_ISSUER_URI: http://keycloak:8180/realms/rcrs
      USERNAME_ATTRIBUTE: preferred_username
      CLIENT_ID: rcrs-app
      CLIENT_SECRET: xuTR1hmVfO5ERSNdgl23JpW3vKTrACk0ampYzmmW3XoGoaJtE8h18CweFsSONWYAC6S7IJbvu7na38odNMogSC
      SCOPE: openid
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - rcrs

  media-service:
    image: ghcr.io/alt-royan/rcrs-media-service:latest
    container_name: media-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_TEMPORAL_CONNECTION_TARGET: temporal:7233
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_HIBERNATE_DEFAUT_SCHEMA: rcrs_media
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_LIQUIBASE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_LIQUIBASE_USER: postgres
      SPRING_LIQUIBASE_PASSWORD: postgres
      SPRING_CLOUD_AWS_CREDENTIALS_ACCESS_KEY: test
      SPRING_CLOUD_AWS_CREDENTIALS_SECRET_KEY: test
      SPRING_CLOUD_AWS_REGION_STATIC: eu-west-1
      SPRING_CLOUD_AWS_ENDPOINT: http://s3:4566
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      OAUTH2_ISSUER_URI: http://keycloak:8180/realms/rcrs
      KEYCLOAK_ISSUER_URI: http://keycloak:8180/realms/rcrs
      USERNAME_ATTRIBUTE: preferred_username
      CLIENT_ID: rcrs-app
      CLIENT_SECRET: xuTR1hmVfO5ERSNdgl23JpW3vKTrACk0ampYzmmW3XoGoaJtE8h18CweFsSONWYAC6S7IJbvu7na38odNMogSC
      SCOPE: openid
      AUDIO_BUCKET: rcrs-audio
      AUDIO_PUBLIC_URL: http://audio.localhost:4566
      AUDIO_VALIDATION_FORMATS: mp3, wav, ogg, flac
      AUDIO_VALIDATION_DURATION_MIN: 1s
      AUDIO_VALIDATION_DURATION_MAX: 2h
      AUDIO_BITRATES: 128k, 192k, 320k
      AUDIO_CODEC: libvorbis
      AUDIO_RATE: 44100
      AUDIO_FORMAT: ogg
      AUDIO_LOUDNORM_I: -18
      AUDIO_LOUDNORM_LRA: 18
      AUDIO_LOUDNORM_TP: -1
      IMAGE_BUCKET: images
      IMAGE_PUBLIC_URL: http://images.localhost:4566
      IMAGE_THUMBNAILS_SIZES: 64,300,640
      UPLOAD_BUCKET: rcrs-upload
      UPLOAD_PUBLIC_URL: http://upload.localhost:4566
      UPLOAD_SIGNATURE_DURATION: 24h
      UPLOAD_UPLOAD_DURATION: 24h
      SQS_QUEUE: rcrs-upload-event-queue
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - rcrs

  user-service:
    image: ghcr.io/alt-royan/rcrs-user-service:latest
    container_name: user-service
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_HIBERNATE_DEFAUT_SCHEMA: rcrs_user
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_LIQUIBASE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_LIQUIBASE_USER: postgres
      SPRING_LIQUIBASE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      OAUTH2_ISSUER_URI: http://keycloak:8180/realms/rcrs
      KEYCLOAK_ISSUER_URI: http://keycloak:8180/realms/rcrs
      USERNAME_ATTRIBUTE: preferred_username
      CLIENT_ID: rcrs-app
      CLIENT_SECRET: xuTR1hmVfO5ERSNdgl23JpW3vKTrACk0ampYzmmW3XoGoaJtE8h18CweFsSONWYAC6S7IJbvu7na38odNMogSC
      SCOPE: openid
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - rcrs

  workflow-service:
    image: ghcr.io/alt-royan/rcrs-workflow-service:latest
    container_name: workflow-service
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_TEMPORAL_CONNECTION_TARGET: temporal:7233
      WORKFLOW_PURGE_CRON: "0 0 4 1 * *"
      FEIGN_METADATA-SERVICE_URL: http://metadata-write-service:8080
      FEIGN_MEDIA-SERVICE_URL: http://media-service:8082
      FEIGN_SEARCH-SERVICE_URL: http://search-service:8083
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      OAUTH2_ISSUER_URI: http://keycloak:8180/realms/rcrs
      KEYCLOAK_ISSUER_URI: http://keycloak:8180/realms/rcrs
      USERNAME_ATTRIBUTE: preferred_username
      CLIENT_ID: rcrs-app
      CLIENT_SECRET: xuTR1hmVfO5ERSNdgl23JpW3vKTrACk0ampYzmmW3XoGoaJtE8h18CweFsSONWYAC6S7IJbvu7na38odNMogSC
      SCOPE: openid
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - rcrs

networks:
  rcrs:
    external: true
