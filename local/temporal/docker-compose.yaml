services:
  temporal-postgres:
    image: postgres:16
    container_name: temporal-postgres
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "5433:5432"
    volumes:
      - temporal-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  temporal:
    image: temporalio/server:1.24.1
    container_name: temporal-server
    ports:
      - "7233:7233"
      - "7234:7234"
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_SEEDS: temporal-postgres
    depends_on:
      temporal-postgres:
        condition: service_healthy
    command: >
      sh -c "
        until temporal-sql-tool setup -u temporal -p temporal; do
          echo 'Waiting for schema setup...'
          sleep 1
        done
        temporal-server --config /etc/temporal/config/docker.yaml
      "
    restart: unless-stopped

  temporal-admin-tools:
    image: temporalio/admin-tools:1.24.1
    container_name: temporal-admin-tools
    environment:
      TEMPORAL_CLI_ADDRESS: temporal:7233
    depends_on:
      - temporal
    command: >
      bash -c "
        until temporal operator namespace describe default; do
          echo 'Waiting for Temporal server...'
          sleep 2
        done
        temporal operator namespace create default || true
      "

  temporal-ui:
    image: temporalio/ui:2.28.0
    container_name: temporal-ui
    ports:
      - "8085:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    depends_on:
      - temporal
    restart: unless-stopped

volumes:
  temporal-pg-data:
