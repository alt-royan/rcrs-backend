name: Build Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build discovery server
        uses: docker/build-push-action@v6
        with:
          context: ./discovery-server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rcrs-discover-server:latest


      - name: Build metadata write service
        uses: docker/build-push-action@v6
        with:
          context: ./services/metadata-write-service
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rcrs-metadata-write-service:latest

      - name: Build metadata read service
        uses: docker/build-push-action@v6
        with:
          context: ./services/metadata-read-service
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rcrs-metadata-read-service:latest

      - name: Build search service
        uses: docker/build-push-action@v6
        with:
          context: ./services/search-service
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rcrs-search-service:latest

      - name: Build workflow service
        uses: docker/build-push-action@v6
        with:
          context: ./services/workflow-service
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rcrs-workflow-service:latest
#
#      - name: Build media service
#        uses: docker/build-push-action@v6
#        with:
#          context: ./services/media-service
#          push: true
#          tags: |
#            ghcr.io/${{ github.repository_owner }}/rcrs-media-service:latest

      - name: Build user service
        uses: docker/build-push-action@v6
        with:
          context: ./services/user-service
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rcrs-user-service:latest