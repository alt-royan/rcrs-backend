syntax = "proto3";

package events;

option java_package = "org.ultra.rcrs.events.common";

import "google/protobuf/timestamp.proto";
import "google/protobuf/any.proto";

enum EventType{
  EVENT_TYPE_UNSPECIFIED = 0;
  ARTIST_CREATED = 1;
  ARTIST_DELETED = 2;
  ARTIST_HIDDEN = 3;
  ALBUM_CREATED = 4;
  ALBUM_DELETED = 5;
  ALBUM_HIDDEN = 6;
  TRACK_CREATED = 7;
  TRACK_DELETED = 8;
  TRACK_HIDDEN = 9;
}

enum AggregateType{
  AGGREGATE_TYPE_UNSPECIFIED = 0;
  ARTIST = 1;
  ALBUM = 2;
  TRACK = 3;
}
message DomainEvent {
  string event_id = 1;
  EventType event_type = 2;
  AggregateType aggregate_type = 4;
  string aggregate_id = 5;
  google.protobuf.Timestamp occurred_at = 6;
  string producer = 7;
  google.protobuf.Any payload = 8;
}