syntax = "proto3";

package events;

option java_package = "org.ultra.rcrs.events.common";

import "google/protobuf/timestamp.proto";
import "google/protobuf/any.proto";

enum EventType{
  EVENT_TYPE_UNSPECIFIED = 0;
  ARTIST_CREATED = 1;
  ARTIST_DELETED = 2;
  ARTIST_HIDDEN = 3;
  ALBUM_CREATED = 4;
  ALBUM_DELETED = 5;
  ALBUM_HIDDEN = 6;
  TRACK_CREATED = 7;
  TRACK_DELETED = 8;
  TRACK_HIDDEN = 9;
  ARTIST_ADDED_TO_TRACK = 10;
  ARTIST_ADDED_TO_ALBUM = 11;
  OTHER_ADDED_TO_TRACK = 12;
  OTHER_DELETED_FROM_TRACK = 13;
  ARTIST_DELETED_FROM_ALBUM = 14;
  ARTIST_DELETED_FROM_TRACK = 15;
  ALBUM_LIFECYCLE_STATUS_UPDATED = 16;
  TRACK_LIFECYCLE_STATUS_UPDATED = 17;
  TRACK_ADDED_TO_ALBUM = 18;
  ARTIST_ACTIVATED = 19;
  ALBUM_ACTIVATED = 20;
  TRACK_ACTIVATED = 21;
}

enum AggregateType{
  AGGREGATE_TYPE_UNSPECIFIED = 0;
  ARTIST = 1;
  ALBUM = 2;
  TRACK = 3;
}
message DomainEvent {
  string event_id = 1;
  EventType event_type = 2;
  AggregateType aggregate_type = 4;
  string aggregate_id = 5;
  google.protobuf.Timestamp occurred_at = 6;
  string producer = 7;
  google.protobuf.Any payload = 8;
}