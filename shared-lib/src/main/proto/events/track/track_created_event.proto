syntax = "proto3";

package events;

option java_package = "org.ultra.rcrs.events.track";

import "google/protobuf/timestamp.proto";
import "events/common/availability_status.proto";
import "events/common/lifecycle_status.proto";

message TrackCreatedEvent {
  string id = 1;
  string title = 2;
  int32 track_number = 3;
  bool explicit = 4;
  AvailabilityStatus availability_status = 5;
  LifecycleStatus lifecycle_status = 6;
  string album_id = 7;
}
