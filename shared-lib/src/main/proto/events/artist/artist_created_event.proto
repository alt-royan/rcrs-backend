syntax = "proto3";

package events;

option java_package = "org.ultra.rcrs.events.artist";

import "events/common/availability_status.proto";
import "events/common/social_link.proto";

message ArtistCreatedEvent {
  string id = 1;
  string name = 2;
  string avatar_s3_key = 3;
  repeated SocialLink social_links = 4;
  repeated string tags = 5;
  AvailabilityStatus availability_status = 6;
}
